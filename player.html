<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="unsafe-url">
    <title>M3U8 Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 960px;
            padding: 10px;
        }

        video {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .info {
            color: #888;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }

        .error {
            color: #ff4444;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            display: none;
        }

        .loading {
            color: #fff;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <video id="video" controls playsinline></video>
        <div class="loading" id="loading">Loading stream...</div>
        <div class="error" id="error"></div>
        <div class="info" id="status">Initializing player...</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const video = document.getElementById('video');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const statusEl = document.getElementById('status');

        const streamUrl = 'https://godlivetv.io/madoball/716/playlist.m3u8';
        const refererUrl = 'https://madoball.com/';

        function setStatus(msg) {
            statusEl.textContent = msg;
        }

        function setError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            loadingEl.style.display = 'none';
            setStatus('Error');
        }

        // Custom loader that sends Referer header on every request
        class RefererLoader {
            constructor(config) {
                this.config = config;
            }

            load(context, config, callbacks) {
                const url = context.url;
                const fetchOptions = {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'omit',
                    headers: {
                        'Referer': refererUrl
                    }
                };

                // For segment loading, we can add Range header for seeking
                if (context.rangeEnd) {
                    fetchOptions.headers['Range'] = 'bytes=' + context.rangeStart + '-' + context.rangeEnd;
                }

                fetch(url, fetchOptions)
                    .then(function (response) {
                        if (!response.ok) {
                            throw new Error('HTTP ' + response.status + ' ' + response.statusText);
                        }
                        return response.arrayBuffer();
                    })
                    .then(function (data) {
                        var stats = {
                            trequest: performance.now(),
                            tfirst: performance.now(),
                            tload: performance.now(),
                            loaded: data.byteLength,
                            total: data.byteLength
                        };
                        var response = {
                            url: url,
                            data: data
                        };
                        callbacks.onSuccess(response, stats, context, null);
                    })
                    .catch(function (err) {
                        var errorData = {
                            type: Hls.ErrorTypes.NETWORK_ERROR,
                            details: Hls.ErrorDetails.FRAG_LOAD_ERROR,
                            fatal: false,
                            url: url,
                            reason: err.message
                        };
                        callbacks.onError(errorData, context, null, err);
                    });
            }

            abort() { }

            destroy() { }
        }

        if (Hls.isSupported()) {
            var hls = new Hls({
                debug: false,
                loader: RefererLoader
            });

            hls.loadSource(streamUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                setStatus('Stream loaded. Click play to start.');
                loadingEl.style.display = 'none';
                video.play().catch(function () {
                    setStatus('Click play to start streaming.');
                });
            });

            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            setError('Network error: ' + (data.reason || 'Cannot load stream. Server may require specific referer.'));
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            setError('Media error. Stream format may not be supported.');
                            break;
                        default:
                            setError('Fatal error: ' + (data.details || 'Unknown'));
                            break;
                    }
                    hls.destroy();
                } else {
                    setStatus('Recovering from error: ' + (data.details || data.reason || 'Unknown'));
                }
            });

            hls.on(Hls.Events.MEDIA_ATTACHED, function () {
                setStatus('Media attached, loading stream...');
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Native HLS support (Safari) - try using fetch + blob for referer
            setStatus('Safari detected. Attempting with proxy...');
            fetch(streamUrl, {
                headers: { 'Referer': refererUrl }
            })
                .then(function (r) { return r.blob(); })
                .then(function (blob) {
                    var url = URL.createObjectURL(blob);
                    video.src = url;
                    video.addEventListener('loadedmetadata', function () {
                        setStatus('Stream loaded. Click play to start.');
                        loadingEl.style.display = 'none';
                    });
                    video.addEventListener('error', function () {
                        setError('Cannot load stream. Safari native HLS failed.');
                    });
                })
                .catch(function () {
                    setError('Cannot load stream. Safari native HLS failed.');
                });
        } else {
            setError('HLS is not supported in this browser.');
        }
    </script>
</body>

</html>
