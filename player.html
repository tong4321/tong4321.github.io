<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Player</title>
<link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet">
</head>
<body>
<div style="text-align:center;padding:20px;font-family:sans-serif">
  <h2>HLS Player</h2>
  <video id="player" class="video-js vjs-default-skin" controls autoplay width="1280" height="720"></video>
  <p style="margin-top:10px;color:#666">URL: https://godlivetv.io/madoball/716/playlist.m3u8</p>
</div>
<script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
<script>
videojs('player', {
  html5: {
    hls: {
      overrideNative: true
    },
    nativeAudioTracks: false,
    nativeVideoTracks: false
  },
  sources: [{
    src: 'https://godlivetv.io/madoball/716/playlist.m3u8',
    type: 'application/x-mpegURL'
  }]
});
</script>
</body>
</html>
